<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Engineer Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // ─── PASTE YOUR FIREBASE CONFIG HERE ───────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyB6eiVbsSwl_yri3zWOOPxIQsUynPpzAC4",
    authDomain: "fintech-roadmap.firebaseapp.com",
    projectId: "fintech-roadmap",
    storageBucket: "fintech-roadmap.firebasestorage.app",
    messagingSenderId: "307247215642",
    appId: "1:307247215642:web:77847201da615e3b788da3"
  };
  // ───────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let progress = {};

  // ── Auth ──────────────────────────────────────────────────────────────────
  window.signInWithGoogle = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { console.error(e); }
  };

  window.signOutUser = async () => {
    await signOut(auth);
    currentUser = null;
    progress = {};
    renderAuth();
    renderAllSections();
  };

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      await loadProgress();
    }
    renderAuth();
    renderAllSections();
  });

  // ── Firestore ─────────────────────────────────────────────────────────────
  async function loadProgress() {
    if (!currentUser) return;
    const ref = doc(db, "progress", currentUser.uid);
    const snap = await getDoc(ref);
    progress = snap.exists() ? (snap.data().tasks || {}) : {};
  }

  async function saveProgress() {
    if (!currentUser) return;
    const ref = doc(db, "progress", currentUser.uid);
    await setDoc(ref, { tasks: progress }, { merge: true });
  }

  // ── Toggle task ───────────────────────────────────────────────────────────
  window.toggleTask = async (taskId, sectionId) => {
    if (!currentUser) {
      showToast("Sign in to save your progress");
      return;
    }
    progress[taskId] = !progress[taskId];
    await saveProgress();
    renderSection(sectionId);
    updateOverallProgress();
  };

  // ── Render auth bar ───────────────────────────────────────────────────────
  function renderAuth() {
    const bar = document.getElementById("auth-bar");
    if (!bar) return;
    if (currentUser) {
      bar.innerHTML = `
        <div class="user-info">
          <img src="${currentUser.photoURL}" alt="" class="avatar">
          <span class="user-name">${currentUser.displayName}</span>
        </div>
        <button class="btn-signout" onclick="signOutUser()">Sign out</button>
      `;
    } else {
      bar.innerHTML = `
        <span class="auth-hint">Sign in to save progress</span>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          Sign in with Google
        </button>
      `;
    }
  }

  // ── Render section ────────────────────────────────────────────────────────
  function renderSection(sectionId) {
    const section = SECTIONS.find(s => s.id === sectionId);
    if (!section) return;
    const el = document.getElementById(`section-${sectionId}`);
    if (!el) return;

    const total = section.tasks.length;
    const done = section.tasks.filter(t => progress[t.id]).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    const allDone = done === total;

    // Header
    const header = el.querySelector(".sec-header");
    header.className = `sec-header ${section.color}${allDone ? " all-done" : ""}`;
    header.querySelector(".sec-title").textContent = section.emoji + " " + section.title;
    header.querySelector(".sec-count").textContent = `${done}/${total}`;
    header.querySelector(".sec-bar-fill").style.width = pct + "%";

    // Rows
    section.tasks.forEach(task => {
      const row = el.querySelector(`[data-task="${task.id}"]`);
      if (!row) return;
      const checked = !!progress[task.id];
      row.className = `task-row${task.isNew ? " new-task" : ""}${checked ? " done" : ""}`;
      const cb = row.querySelector(".checkbox");
      cb.className = `checkbox${checked ? " checked" : ""}`;
      cb.innerHTML = checked
        ? `<svg width="11" height="9" viewBox="0 0 11 9"><path d="M1 4L4 7.5L10 1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : "";
    });
  }

  function renderAllSections() {
    SECTIONS.forEach(s => renderSection(s.id));
    updateOverallProgress();
  }

  function updateOverallProgress() {
    const allTasks = SECTIONS.flatMap(s => s.tasks);
    const total = allTasks.length;
    const done = allTasks.filter(t => progress[t.id]).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    const el = document.getElementById("overall-progress");
    if (el) {
      el.querySelector(".op-pct").textContent = pct + "%";
      el.querySelector(".op-count").textContent = `${done} of ${total} tasks`;
      el.querySelector(".op-bar-fill").style.width = pct + "%";
    }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  // ── Data ───────────────────────────────────────────────────────────────────
  const SECTIONS = [
    {
      id: "backend", emoji: "🟩", title: "Backend — Node + Express",
      color: "c-green",
      tasks: [
        { id: "b1", subtopic: "Node.js", task: "Setup Node server", learn: "What Node.js is, JS runtime, basic http module, how to run node index.js", proof: "Server on localhost:3000 returns \"Server running\"" },
        { id: "b2", subtopic: "Express", task: "Setup Express app", learn: "Express basics: app, routes, middleware, app.get(), app.post(), request-response cycle", proof: "/test endpoint returns { message: \"API working\" }" },
        { id: "b3", subtopic: "REST API", task: "CRUD events", learn: "REST principles (GET, POST, PUT, DELETE), JSON handling", proof: "Create, fetch, update, delete via Postman" },
        { id: "b4", subtopic: "Request handling", task: "req / res", learn: "req.body, req.params, req.query — how data flows client → server", proof: "Send JSON, see it logged + returned correctly" },
        { id: "b5", subtopic: "Middleware", task: "Custom middleware", learn: "Middleware flow with next(), logging, error handling basics", proof: "Every request logs method + route in terminal" },
        { id: "b6", subtopic: "Validation", task: "Validate requests", learn: "Never trust user input. Use express-validator or Zod to reject bad data before it hits your logic", proof: "Empty signup body returns a clear 400 error — not a crash", isNew: true },
        { id: "b7", subtopic: "Error handling", task: "Global error handler", learn: "One central error middleware catches everything — app never exposes a stack trace", proof: "Broken route returns { error: \"something went wrong\" }, not a 500 crash", isNew: true },
      ]
    },
    {
      id: "auth", emoji: "🔐", title: "Authentication",
      color: "c-red",
      tasks: [
        { id: "a1", subtopic: "Auth", task: "User signup", learn: "Accept user input, validate email/password, store securely in DB", proof: "POST /signup creates user in DB" },
        { id: "a2", subtopic: "Auth", task: "Password hashing", learn: "bcrypt: why hashing is needed, how to hash and compare passwords", proof: "Password in DB is NOT readable — it's hashed" },
        { id: "a3", subtopic: "Auth", task: "Login", learn: "Verify credentials against the hashed password", proof: "Correct login succeeds, wrong password fails cleanly" },
        { id: "a4", subtopic: "Auth", task: "JWT", learn: "What JWT is, how to sign and verify tokens, token expiry", proof: "Login returns a token; token unlocks a protected route" },
        { id: "a5", subtopic: "Auth", task: "Protected routes", learn: "Auth guard middleware that checks the token on every request", proof: "/profile only works with a valid token" },
        { id: "a6", subtopic: "Rate limiting", task: "Block brute force", learn: "express-rate-limit blocks attackers hammering /login. Standard in every production fintech API", proof: "/login blocks after 5 failed attempts in 1 min, returns 429", isNew: true },
      ]
    },
    {
      id: "db", emoji: "🟦", title: "Database — PostgreSQL",
      color: "c-blue",
      tasks: [
        { id: "d1", subtopic: "Setup", task: "Install PostgreSQL", learn: "How PostgreSQL works, install locally, create a DB", proof: "Connect to DB via terminal or GUI (pgAdmin)" },
        { id: "d2", subtopic: "Connection", task: "Connect Node → DB", learn: "How backend connects to DB using the pg library (node-postgres)", proof: "App connects without error, query runs" },
        { id: "d3", subtopic: "Tables", task: "Create tables", learn: "SQL basics: CREATE TABLE, data types, constraints", proof: "users table exists with id / email / password columns" },
        { id: "d4", subtopic: "CRUD", task: "Insert & fetch", learn: "SELECT, INSERT, UPDATE, DELETE with real data", proof: "Save a user and fetch them back from DB" },
        { id: "d5", subtopic: "Relationships", task: "User ↔ transactions", learn: "Foreign keys — how tables link to each other", proof: "Each transaction row links to a user ID" },
        { id: "d6", subtopic: "SQL transactions", task: "BEGIN / COMMIT / ROLLBACK", learn: "Operations that must ALL succeed or ALL fail. The most critical DB concept in fintech — without this, money can disappear or get created from nothing", proof: "Simulate a crash mid-transfer — both balances stay unchanged", isNew: true },
      ]
    },
    {
      id: "fintech", emoji: "🟨", title: "Fintech Logic",
      color: "c-amber",
      tasks: [
        { id: "f1", subtopic: "Wallet", task: "Balance field", learn: "Store money as integers (kobo/cents), never floats. Floats lose precision — you cannot afford that", proof: "Each user has balance stored as integer (e.g. 500000 = ₦5,000)" },
        { id: "f2", subtopic: "Credit", task: "Add money", learn: "Update balance safely inside a SQL transaction", proof: "/add-money increases balance correctly" },
        { id: "f3", subtopic: "Debit", task: "Send money", learn: "Subtract + validate. Debit sender and credit receiver must be atomic — one SQL transaction wrapping both", proof: "Cannot send more than balance. Crash mid-transfer leaves both accounts unchanged" },
        { id: "f4", subtopic: "Transactions", task: "Record logs", learn: "Every money movement gets a DB record — never mutate balances silently", proof: "Every transfer creates a transaction record in DB" },
        { id: "f5", subtopic: "Ledger", task: "Consistency", learn: "Balance = sum of all credits minus debits. If you store it right, you can always recalculate", proof: "Balance recalculated from transaction history matches stored balance" },
        { id: "f6", subtopic: "Idempotency", task: "Prevent duplicate charges", learn: "What happens if a user taps send twice? Idempotency keys prevent double-charging. Paystack, Flutterwave, Stripe all use this", proof: "Sending same transfer request twice (same key) only debits once", isNew: true },
      ]
    },
    {
      id: "testing", emoji: "🧪", title: "Testing",
      color: "c-pink",
      tasks: [
        { id: "t1", subtopic: "Unit tests", task: "Test pure functions", learn: "Install Jest. Test small functions in isolation — balance logic, validators. No DB, no server needed", proof: "npm test runs and all unit tests pass", isNew: true },
        { id: "t2", subtopic: "Integration tests", task: "Test API endpoints", learn: "Supertest spins up your real Express app and hits real endpoints in tests", proof: "POST /signup and POST /login tests pass automatically", isNew: true },
        { id: "t3", subtopic: "Edge case tests", task: "Test money logic", learn: "Write tests for dangerous cases: send more than balance, send 0, negative amount, concurrent transfers", proof: "All edge case tests pass. Break your own code and watch tests catch it", isNew: true },
      ]
    },
    {
      id: "cloud", emoji: "☁️", title: "Cloud — AWS",
      color: "c-teal",
      tasks: [
        { id: "c1", subtopic: "EC2", task: "Launch server", learn: "What a cloud server is, how to spin up an EC2 instance, SSH access", proof: "You can SSH into your running server" },
        { id: "c2", subtopic: "Deployment", task: "Deploy backend", learn: "Copy your Node app to the server, install dependencies, run it", proof: "API responds on a public IP — not localhost" },
        { id: "c3", subtopic: "Env vars", task: "Config management", learn: ".env files and secrets handling — never hardcode keys in code", proof: "No API keys visible in your codebase or git history" },
        { id: "c4", subtopic: "Database", task: "Hosted DB", learn: "AWS RDS — managed PostgreSQL in the cloud", proof: "App connects to cloud DB, not local DB" },
        { id: "c5", subtopic: "Security", task: "IAM basics", learn: "Roles, permissions, least privilege — only give access that's needed", proof: "Restricted IAM access configured correctly" },
        { id: "c6", subtopic: "PM2", task: "Keep app alive", learn: "PM2 keeps your Node app running and restarts it if it crashes. Required for any real server", proof: "App auto-restarts after a crash. Logs visible via pm2 logs", isNew: true },
      ]
    },
    {
      id: "devops", emoji: "⚙️", title: "DevOps (Later)",
      color: "c-gray",
      tasks: [
        { id: "dv1", subtopic: "Docker", task: "Containerise app", learn: "Containers and Dockerfile — package your app so it runs identically everywhere", proof: "App runs via docker run" },
        { id: "dv2", subtopic: "CI/CD", task: "Auto deploy", learn: "GitHub Actions — run tests on every push, auto-deploy if they pass", proof: "Push to main → tests run → app deploys automatically" },
      ]
    },
    {
      id: "finance", emoji: "🟪", title: "Finance — 20% Layer",
      color: "c-purple",
      tasks: [
        { id: "fn1", subtopic: "Risk", task: "Basic risk", learn: "What risk means in finance — probability of loss, expected value", proof: "Can explain risk with real examples, not just definitions" },
        { id: "fn2", subtopic: "Portfolio", task: "Diversification", learn: "Why spreading investments reduces risk — allocation logic", proof: "Build a simple portfolio allocation API endpoint" },
        { id: "fn3", subtopic: "Simulation", task: "\"What if\" tool", learn: "Compound interest, future value formula applied in code", proof: "API: If I invest ₦X monthly at Y% return, what do I have in N years?" },
        { id: "fn4", subtopic: "FX basics", task: "Currency conversion API", learn: "How exchange rates work. Build an endpoint using a live rate API. Directly relevant to Nigerian fintech — NGN/USD is every local fintech's reality", proof: "/convert?from=USD&to=NGN&amount=100 returns correct live value", isNew: true },
        { id: "fn5", subtopic: "Analytics", task: "Transaction summary endpoint", learn: "Aggregate a user's transaction history — total debits, credits, net balance, breakdown by month. What every fintech dashboard is built on", proof: "/analytics returns spending summary for a user — totals + monthly breakdown", isNew: true },
      ]
    },
  ];

  // ── Build DOM ──────────────────────────────────────────────────────────────
  window.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("sections-container");
    container.innerHTML = SECTIONS.map(section => buildSectionHTML(section)).join("");

    // Attach click handlers
    container.querySelectorAll(".task-row").forEach(row => {
      row.addEventListener("click", () => {
        const taskId = row.dataset.task;
        const sectionId = row.dataset.section;
        toggleTask(taskId, sectionId);
      });
    });

    renderAuth();
    renderAllSections();
  });

  function buildSectionHTML(section) {
    const rows = section.tasks.map(task => `
      <tr class="task-row${task.isNew ? " new-task" : ""}" data-task="${task.id}" data-section="${section.id}">
        <td class="td-check"><div class="checkbox"></div></td>
        <td class="td-sub"><span class="subtag${task.isNew ? " subtag-new" : ""}">${task.subtopic}</span></td>
        <td class="td-task">${task.task}</td>
        <td class="td-learn">${task.learn}</td>
        <td class="td-proof">${task.proof}</td>
      </tr>
    `).join("");

    return `
      <div class="section" id="section-${section.id}">
        <div class="sec-header ${section.color}">
          <span class="sec-title">${section.emoji} ${section.title}</span>
          <div class="sec-meta">
            <div class="sec-bar"><div class="sec-bar-fill"></div></div>
            <span class="sec-count">0/${section.tasks.length}</span>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="th-check"></th>
                <th class="th-sub">Subtopic</th>
                <th class="th-task">Task</th>
                <th class="th-learn">What to learn</th>
                <th class="th-proof">Proof of completion</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  }
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e2e2f0;
  --muted: #6b6b88;
  --accent: #f5c518;

  --c-green: #3dd68c; --c-green-bg: rgba(61,214,140,0.08); --c-green-border: rgba(61,214,140,0.18);
  --c-red: #f87171; --c-red-bg: rgba(248,113,113,0.08); --c-red-border: rgba(248,113,113,0.18);
  --c-blue: #60a5fa; --c-blue-bg: rgba(96,165,250,0.08); --c-blue-border: rgba(96,165,250,0.18);
  --c-amber: #fbbf24; --c-amber-bg: rgba(251,191,36,0.08); --c-amber-border: rgba(251,191,36,0.18);
  --c-teal: #2dd4bf; --c-teal-bg: rgba(45,212,191,0.08); --c-teal-border: rgba(45,212,191,0.18);
  --c-gray: #9ca3af; --c-gray-bg: rgba(156,163,175,0.08); --c-gray-border: rgba(156,163,175,0.18);
  --c-purple: #a78bfa; --c-purple-bg: rgba(167,139,250,0.08); --c-purple-border: rgba(167,139,250,0.18);
  --c-pink: #f472b6; --c-pink-bg: rgba(244,114,182,0.08); --c-pink-border: rgba(244,114,182,0.18);
}

html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Space Mono', monospace;
  font-size: 13px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
}
#auth-bar { display: flex; align-items: center; gap: 12px; }
.user-info { display: flex; align-items: center; gap: 8px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border2); }
.user-name { font-size: 13px; color: var(--text); }
.btn-google {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn-google:hover { background: rgba(255,255,255,0.06); border-color: var(--border2); }
.btn-signout {
  padding: 6px 12px; border-radius: 6px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: 'Syne', sans-serif;
  font-size: 12px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-signout:hover { color: var(--text); border-color: var(--border2); }
.auth-hint { font-size: 12px; color: var(--muted); }

/* ── PAGE ── */
.page { max-width: 1100px; margin: 0 auto; padding: 36px 20px 0; }

/* ── HERO ── */
.hero { margin-bottom: 36px; }
.hero h1 {
  font-family: 'Space Mono', monospace;
  font-size: clamp(18px, 3vw, 26px);
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.hero p { color: var(--muted); font-size: 13px; line-height: 1.6; max-width: 520px; }

/* ── OVERALL PROGRESS ── */
#overall-progress {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 36px;
}
.op-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.op-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
.op-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); width: 0%; }
.op-pct { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }
.op-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* ── LEGEND ── */
.legend { display: flex; gap: 18px; margin-bottom: 28px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
.ldot { width: 9px; height: 9px; border-radius: 2px; }

/* ── SECTION ── */
.section { margin-bottom: 28px; }

.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-radius: 8px 8px 0 0;
  border: 1px solid transparent;
  transition: all 0.3s ease;
}
.sec-meta { display: flex; align-items: center; gap: 10px; }
.sec-title { font-size: 13px; font-weight: 600; font-family: 'Space Mono', monospace; }
.sec-bar { width: 80px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
.sec-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); width: 0%; background: currentColor; opacity: 0.7; }
.sec-count { font-size: 11px; font-family: 'Space Mono', monospace; opacity: 0.7; }

.c-green  { background: var(--c-green-bg);  color: var(--c-green);  border-color: var(--c-green-border); }
.c-red    { background: var(--c-red-bg);    color: var(--c-red);    border-color: var(--c-red-border); }
.c-blue   { background: var(--c-blue-bg);   color: var(--c-blue);   border-color: var(--c-blue-border); }
.c-amber  { background: var(--c-amber-bg);  color: var(--c-amber);  border-color: var(--c-amber-border); }
.c-teal   { background: var(--c-teal-bg);   color: var(--c-teal);   border-color: var(--c-teal-border); }
.c-gray   { background: var(--c-gray-bg);   color: var(--c-gray);   border-color: var(--c-gray-border); }
.c-purple { background: var(--c-purple-bg); color: var(--c-purple); border-color: var(--c-purple-border); }
.c-pink   { background: var(--c-pink-bg);   color: var(--c-pink);   border-color: var(--c-pink-border); }

.all-done { opacity: 1; }
.all-done .sec-title::after { content: " ✓"; }

/* ── TABLE ── */
.table-wrap {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; background: var(--surface); min-width: 700px; }
thead th {
  padding: 8px 12px;
  background: var(--surface2);
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
  border-bottom: 1px solid var(--border);
}
.th-check { width: 36px; }
.th-sub   { width: 120px; }
.th-task  { width: 150px; }
.th-learn { }
.th-proof { width: 220px; }

/* ── TASK ROW ── */
.task-row {
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border);
}
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: rgba(255,255,255,0.025); }
.task-row.new-task { border-left: 2px solid var(--accent); }
.task-row.done td { opacity: 0.45; }
.task-row.done .td-task { text-decoration: line-through; }

td { padding: 10px 12px; vertical-align: top; font-size: 13px; line-height: 1.55; }
.td-check { width: 36px; vertical-align: middle; }
.td-sub { vertical-align: middle; }
.td-proof { color: var(--muted); font-size: 12px; }

/* ── CHECKBOX ── */
.checkbox {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid var(--border2);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  color: var(--bg);
  flex-shrink: 0;
}
.checkbox.checked {
  background: var(--c-green);
  border-color: var(--c-green);
}
.task-row:hover .checkbox:not(.checked) { border-color: rgba(255,255,255,0.3); }

/* ── SUBTAG ── */
.subtag {
  display: inline-block;
  font-size: 11px; padding: 2px 8px;
  border-radius: 99px; font-weight: 500;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  color: var(--muted);
  white-space: nowrap;
  font-family: 'Space Mono', monospace;
}
.subtag-new {
  background: rgba(245,197,24,0.1);
  border-color: rgba(245,197,24,0.25);
  color: var(--accent);
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 18px; border-radius: 8px;
  font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">Fintech Roadmap</span>
  <div id="auth-bar">
    <span class="auth-hint">Loading...</span>
  </div>
</nav>

<div class="page">

  <div class="hero">
    <h1>Fintech Cloud Engineer — Roadmap</h1>
    <p>Work top to bottom. Tick each task when you've hit the proof of completion. Sign in with Google to save your progress across devices.</p>
  </div>

  <div id="overall-progress">
    <span class="op-label">Overall</span>
    <div class="op-bar"><div class="op-bar-fill"></div></div>
    <span class="op-pct">0%</span>
    <span class="op-count">0 of 0 tasks</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:var(--accent)"></div> New task added to original roadmap</div>
    <div class="legend-item"><div class="ldot" style="background:var(--c-green)"></div> Completed</div>
  </div>

  <div id="sections-container"></div>
</div>

<div id="toast"></div>
</body>
</html>
